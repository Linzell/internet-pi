---
- name: Check if Docker is already present.
  ansible.builtin.command: which docker
  failed_when: false
  changed_when: false
  check_mode: false
  register: docker_command_result

# --- Debian / Raspberry Pi OS installation (manual repo setup) ---
# The Docker convenience script maps to 'raspbian' on Raspberry Pi OS,
# and Docker does not publish a 'raspbian trixie' (or later) release file.
# We therefore configure the upstream 'debian' repository directly, which
# supports all Debian codenames (bullseye, bookworm, trixie, …) on all
# architectures (amd64, arm64, armhf).
#
# IMPORTANT: the stale docker.list left by a previous failed run must be
# removed BEFORE any apt cache refresh, otherwise every apt task that uses
# update_cache: true will fail against the broken raspbian repo.

- name: Remove stale raspbian Docker apt repository if present (Debian).
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

- name: Refresh apt cache after removing stale repo (Debian).
  ansible.builtin.apt:
    update_cache: true
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

- name: Install Docker prerequisites (Debian).
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

- name: Ensure /etc/apt/keyrings directory exists (Debian).
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

- name: Download Docker GPG key (Debian).
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

- name: Get system architecture (Debian).
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false
  check_mode: false
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

- name: Add Docker apt repository using debian channel (Debian / Raspbian).
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker
    update_cache: true
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

- name: Install Docker engine packages (Debian).
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Debian"

# --- Archlinux installation (convenience script) ---

- name: Download Docker install convenience script (Archlinux).
  ansible.builtin.get_url:
    url: https://get.docker.com/
    dest: /tmp/get-docker.sh
    mode: "0775"
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Archlinux"

- name: Run Docker install convenience script (Archlinux).
  ansible.builtin.command: /tmp/get-docker.sh
  environment:
    CHANNEL: stable
  when:
    - docker_command_result.rc == 1
    - ansible_facts.os_family == "Archlinux"

# --- Common post-install tasks ---

- name: Ensure Docker is started.
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Ensure dependencies are installed (Debian).
  ansible.builtin.apt:
    name:
      - libffi-dev
      - libssl-dev
      - python3-dev
      - python3-pip
      - git
      - rsync
      - resolvconf
    state: present
  when: ansible_facts.os_family == "Debian"

- name: Ensure dependencies are installed (Archlinux).
  community.general.pacman:
    name:
      - libffi
      - openssl
      - base-devel
      - python-pip
      - git
      - rsync
      - docker-compose-plugin
    state: present
  when: ansible_facts.os_family == "Archlinux"

- name: "Ensure user is added to the docker group: {{ ansible_user }}"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# reset_connection doesn't support conditionals.
- name: Reset connection so docker group is picked up.
  meta: reset_connection
